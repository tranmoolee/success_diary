version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: success-diary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-success_diary}
      POSTGRES_USER: ${DB_USER:-diary}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-diary} -d ${DB_NAME:-success_diary}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  success-diary:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: success-diary
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3800}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-success_diary}
      - DB_USER=${DB_USER:-diary}
      - DB_PASSWORD=${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?请在 .env 中设置 JWT_SECRET（至少16字符）}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
