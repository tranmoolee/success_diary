<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成功日记 - 小狗钱钱</title>
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --primary: #4f46e5;
  --primary-light: #e0e7ff;
  --primary-dark: #3730a3;
  --accent: #f59e0b;
  --accent-light: #fef3c7;
  --success: #10b981;
  --success-light: #d1fae5;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --danger: #ef4444;
  --radius: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* Header */
.header {
  padding: 16px 20px 12px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.header .subtitle {
  font-size: 12px;
  color: var(--text-muted);
}

.streak-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}

/* Main Content */
.main {
  flex: 1;
  padding: 16px 20px;
  padding-bottom: 90px;
  overflow-y: auto;
}

/* Tab Navigation */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 0;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 10px;
  cursor: pointer;
  transition: color 0.2s;
}

.tab-item.active { color: var(--primary); }
.tab-item svg { width: 24px; height: 24px; }

/* Page visibility */
.page { display: none; }
.page.active { display: block; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Quote Card */
.quote-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.quote-card::before {
  content: '"';
  position: absolute;
  top: -10px;
  left: 10px;
  font-size: 80px;
  opacity: 0.15;
  font-family: Georgia, serif;
}

.quote-text {
  font-size: 14px;
  line-height: 1.6;
  position: relative;
  z-index: 1;
}

.quote-author {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 8px;
  text-align: right;
}

/* Today's Entries */
.entry-input-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.entry-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.entry-number {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.entry-number.filled {
  background: var(--primary);
  color: white;
}

.entry-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}

.entry-input:focus {
  border-color: var(--primary);
  background: white;
}

.entry-input::placeholder { color: var(--text-muted); }

.tag-select {
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  background: white;
  outline: none;
  cursor: pointer;
  flex-shrink: 0;
}

.save-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}

.save-btn:hover { background: var(--primary-dark); }
.save-btn:disabled { opacity: 0.5; cursor: default; }

/* Progress Ring */
.progress-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.progress-ring-container {
  position: relative;
  width: 64px;
  height: 64px;
  flex-shrink: 0;
}

.progress-ring { transform: rotate(-90deg); }

.progress-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 6;
}

.progress-ring-fill {
  fill: none;
  stroke: var(--primary);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s ease;
}

.progress-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
}

.progress-info h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}

.progress-info p {
  font-size: 12px;
  color: var(--text-muted);
}

/* History */
.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.calendar-header h3 {
  font-size: 16px;
  font-weight: 600;
}

.calendar-nav {
  display: flex;
  gap: 8px;
}

.calendar-nav button {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 16px;
}

.calendar-weekday {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px 0;
  font-weight: 500;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  color: var(--text);
  transition: all 0.2s;
}

.calendar-day:hover { background: var(--bg); }
.calendar-day.empty { cursor: default; }
.calendar-day.today { font-weight: 700; border: 2px solid var(--primary); }
.calendar-day.has-entry { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.calendar-day.has-entry.full { background: var(--primary); color: white; }
.calendar-day.selected { box-shadow: 0 0 0 2px var(--accent); }

.history-detail {
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.history-date {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-secondary);
}

.history-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.history-item:last-child { border-bottom: none; }

.history-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary);
  white-space: nowrap;
}

.history-text {
  font-size: 14px;
  line-height: 1.5;
  flex: 1;
}

/* Dreams Page */
.dream-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.dream-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  background: var(--bg);
}

.dream-input:focus { border-color: var(--primary); background: white; }

.dream-add-btn {
  padding: 10px 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.dream-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.dream-item:last-child { border-bottom: none; }

.dream-check {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.dream-check.done {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.dream-content { flex: 1; }
.dream-name { font-size: 14px; font-weight: 500; }
.dream-name.done { text-decoration: line-through; color: var(--text-muted); }

.dream-cost-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

.dream-cost-label { font-size: 11px; color: var(--text-muted); }

.dream-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.dream-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s;
}

.dream-amount {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

.dream-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  font-size: 18px;
  line-height: 1;
}

/* Savings Jar */
.jar-card {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  border-radius: var(--radius);
  padding: 20px;
  color: white;
  text-align: center;
  margin-bottom: 16px;
}

.jar-icon { font-size: 40px; margin-bottom: 8px; }
.jar-amount { font-size: 28px; font-weight: 800; }
.jar-label { font-size: 12px; opacity: 0.85; margin-top: 4px; }

.jar-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.jar-btn {
  flex: 1;
  padding: 8px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.jar-btn:hover { background: rgba(255,255,255,0.25); }

/* Stats Page */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.chart-container {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.chart-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
}

.chart-canvas {
  width: 100%;
  height: 200px;
}

.tag-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg);
  border-radius: 20px;
  font-size: 13px;
}

.tag-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  max-height: 60vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.modal h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
}

.modal-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  margin-bottom: 12px;
}

.modal-input:focus { border-color: var(--primary); }

.modal-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 300;
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* Tags colors */
.tag-学习 { background: #dbeafe; color: #2563eb; }
.tag-工作 { background: #fce7f3; color: #db2777; }
.tag-社交 { background: #d1fae5; color: #059669; }
.tag-健康 { background: #fed7aa; color: #ea580c; }
.tag-创意 { background: #e9d5ff; color: #9333ea; }
.tag-理财 { background: #fef3c7; color: #d97706; }
.tag-生活 { background: #e0e7ff; color: #4f46e5; }

/* Onboarding overlay */
.onboarding {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 30px;
  text-align: center;
}

.onboarding.hide { display: none; }

.onboarding-icon { font-size: 72px; margin-bottom: 24px; }

.onboarding h2 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 12px;
}

.onboarding p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 320px;
}

.onboarding .start-btn {
  padding: 16px 48px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

/* Responsive */
@media (min-width: 481px) {
  body {
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
}
</style>
</head>
<body>

<!-- Onboarding -->
<div class="onboarding" id="onboarding">
  <div class="onboarding-icon">📒</div>
  <h2>成功日记</h2>
  <p>每天记录让你自豪的事情，日积月累，你会发现自己比想象中更优秀。</p>
  <button class="start-btn" onclick="dismissOnboarding()">开始记录</button>
</div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>成功日记</h1>
      <div class="subtitle" id="todayDate"></div>
    </div>
    <div class="streak-badge" id="streakBadge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span id="streakCount">0</span> 天
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- === TODAY PAGE === -->
  <div class="page active" id="page-today">
    <div class="quote-card">
      <div class="quote-text" id="dailyQuote"></div>
      <div class="quote-author">— 成功日记理念</div>
    </div>

    <div class="progress-section">
      <div class="progress-ring-container">
        <svg class="progress-ring" width="64" height="64">
          <circle class="progress-ring-bg" cx="32" cy="32" r="26"/>
          <circle class="progress-ring-fill" id="progressRing" cx="32" cy="32" r="26"
            stroke-dasharray="163.36" stroke-dashoffset="163.36"/>
        </svg>
        <div class="progress-center" id="progressCount">0/5</div>
      </div>
      <div class="progress-info">
        <h3>今日成功事项</h3>
        <p id="progressHint">记录5件让你自豪的事</p>
      </div>
    </div>

    <div class="card">
      <div class="entry-input-group" id="entryInputs"></div>
      <button class="save-btn" id="saveBtn" onclick="saveToday()">保存今日记录</button>
    </div>
  </div>

  <!-- === HISTORY PAGE === -->
  <div class="page" id="page-history">
    <div class="card">
      <div class="calendar-header">
        <button class="calendar-nav-btn" onclick="changeMonth(-1)" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;">‹</button>
        <h3 id="calendarMonth"></h3>
        <button class="calendar-nav-btn" onclick="changeMonth(1)" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;">›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="history-detail" id="historyDetail"></div>
    </div>
  </div>

  <!-- === DREAMS PAGE === -->
  <div class="page" id="page-dreams">
    <div class="jar-card">
      <div class="jar-icon">🏦</div>
      <div class="jar-amount" id="jarAmount">¥0</div>
      <div class="jar-label">愿望存钱罐</div>
      <div class="jar-actions">
        <button class="jar-btn" onclick="showSavingsModal('deposit')">+ 存入</button>
        <button class="jar-btn" onclick="showSavingsModal('withdraw')">- 支出</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>✨</span> 梦想清单
      </div>
      <div class="dream-input-row">
        <input class="dream-input" id="dreamInput" placeholder="写下你的梦想..." />
        <input class="dream-input" id="dreamCostInput" placeholder="¥ 费用" style="width: 90px; flex: none;" type="number" />
        <button class="dream-add-btn" onclick="addDream()">添加</button>
      </div>
      <div id="dreamList"></div>
    </div>
  </div>

  <!-- === STATS PAGE === -->
  <div class="page" id="page-stats">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">总记录天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statEntries">0</div>
        <div class="stat-label">成功事项</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">最长连续</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAvg">0</div>
        <div class="stat-label">日均条数</div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-title">自信成长曲线（近30天）</div>
      <canvas class="chart-canvas" id="growthChart"></canvas>
    </div>

    <div class="chart-container">
      <div class="chart-title">分类统计</div>
      <div class="tag-stats" id="tagStats"></div>
    </div>
  </div>

</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-item active" onclick="switchTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
    <span>今天</span>
  </button>
  <button class="tab-item" onclick="switchTab('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>历史</span>
  </button>
  <button class="tab-item" onclick="switchTab('dreams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01z"/></svg>
    <span>梦想</span>
  </button>
  <button class="tab-item" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    <span>统计</span>
  </button>
</div>

<!-- Savings Modal -->
<div class="modal-overlay" id="savingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="savingsModalTitle">存入金额</h3>
    <input class="modal-input" id="savingsInput" type="number" placeholder="输入金额" />
    <input class="modal-input" id="savingsNote" placeholder="备注（可选）" />
    <button class="modal-btn" id="savingsConfirmBtn" onclick="confirmSavings()">确认</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============== DATA LAYER ==============
const TAGS = ['学习', '工作', '社交', '健康', '创意', '理财', '生活'];
const TAG_COLORS = {
  '学习': '#2563eb', '工作': '#db2777', '社交': '#059669',
  '健康': '#ea580c', '创意': '#9333ea', '理财': '#d97706', '生活': '#4f46e5'
};

const QUOTES = [
  "当你把精力集中在你能做到的事情上时，你就会变得越来越强大。",
  "你所关注的事物会在你的生活中不断增长。",
  "成功的第一步是相信自己能够成功。",
  "每一个小成就都是通向大成功的阶梯。",
  "坚持记录你的成功，你会惊讶于自己的成长。",
  "不是因为困难我们不敢做，而是因为不敢做才变得困难。",
  "财富和自信都来自于日积月累的小行动。",
  "梦想不会自己实现，但记录梦想是实现它的第一步。",
  "今天的每一个小小成就，都在为明天的大成功铺路。",
  "你已经做到了很多了不起的事情，只是你还没有注意到。"
];

function getData(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}

function setData(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

// ============== ONBOARDING ==============
function dismissOnboarding() {
  document.getElementById('onboarding').classList.add('hide');
  setData('sd_onboarded', true);
}

// ============== TAB SWITCHING ==============
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab-item')[
    ['today','history','dreams','stats'].indexOf(name)
  ].classList.add('active');

  if (name === 'history') renderCalendar();
  if (name === 'stats') renderStats();
  if (name === 'dreams') renderDreams();
}

// ============== TODAY PAGE ==============
function renderTodayInputs() {
  const entries = getData('sd_entries', {});
  const today = entries[todayKey()] || [];
  const container = document.getElementById('entryInputs');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const existing = today[i] || {};
    const filled = existing.text ? ' filled' : '';
    container.innerHTML += `
      <div class="entry-row">
        <div class="entry-number${filled}">${i+1}</div>
        <input class="entry-input" id="entry-${i}" value="${existing.text || ''}"
          placeholder="第${i+1}件成功的事..." />
        <select class="tag-select" id="tag-${i}">
          ${TAGS.map(t => `<option value="${t}" ${existing.tag === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </div>
    `;
  }

  updateProgress(today.filter(e => e.text).length);
  updateSaveButton(today);
}

function updateProgress(count) {
  const circumference = 2 * Math.PI * 26;
  const offset = circumference - (count / 5) * circumference;
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('progressCount').textContent = `${count}/5`;

  const hints = [
    '记录5件让你自豪的事',
    '继续加油，还剩4件！',
    '很棒！已经记录2件了',
    '过半了！继续保持',
    '就差最后一件了！',
    '太棒了！今天全部完成！'
  ];
  document.getElementById('progressHint').textContent = hints[count];
}

function saveToday() {
  const entries = getData('sd_entries', {});
  const todayEntries = [];

  for (let i = 0; i < 5; i++) {
    const text = document.getElementById(`entry-${i}`).value.trim();
    const tag = document.getElementById(`tag-${i}`).value;
    if (text) todayEntries.push({ text, tag });
  }

  if (todayEntries.length === 0) {
    showToast('至少记录一件成功的事哦');
    return;
  }

  entries[todayKey()] = todayEntries;
  setData('sd_entries', entries);
  renderTodayInputs();
  updateStreak();
  showToast(`已保存 ${todayEntries.length} 条记录 ✓`);
}

function updateSaveButton(today) {
  const btn = document.getElementById('saveBtn');
  const hasInput = Array.from(document.querySelectorAll('.entry-input')).some(el => el.value.trim());
  btn.disabled = false;
  btn.textContent = today && today.length > 0 ? '更新今日记录' : '保存今日记录';
}

// ============== STREAK ==============
function getStreak() {
  const entries = getData('sd_entries', {});
  const dates = Object.keys(entries).sort().reverse();
  if (dates.length === 0) return 0;

  let streak = 0;
  let checkDate = new Date();
  checkDate.setHours(0,0,0,0);

  // Check if today has entry
  if (!entries[todayKey()]) {
    checkDate.setDate(checkDate.getDate() - 1);
  }

  while (true) {
    const key = checkDate.toISOString().slice(0, 10);
    if (entries[key] && entries[key].length > 0) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getMaxStreak() {
  const entries = getData('sd_entries', {});
  const dates = Object.keys(entries).filter(d => entries[d].length > 0).sort();
  if (dates.length === 0) return 0;

  let max = 1, current = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (curr - prev) / (1000 * 60 * 60 * 24);
    if (diff === 1) {
      current++;
      max = Math.max(max, current);
    } else {
      current = 1;
    }
  }
  return Math.max(max, current);
}

function updateStreak() {
  const streak = getStreak();
  document.getElementById('streakCount').textContent = streak;
}

// ============== HISTORY / CALENDAR ==============
let calendarDate = new Date();

function renderCalendar() {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const entries = getData('sd_entries', {});

  document.getElementById('calendarMonth').textContent = `${year}年${month + 1}月`;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  weekdays.forEach(w => {
    grid.innerHTML += `<div class="calendar-weekday">${w}</div>`;
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += `<div class="calendar-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = entries[dateKey];
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
    let cls = 'calendar-day';
    if (isToday) cls += ' today';
    if (entry && entry.length > 0) cls += ' has-entry';
    if (entry && entry.length >= 5) cls += ' full';
    grid.innerHTML += `<div class="${cls}" onclick="showDayDetail('${dateKey}')">${d}</div>`;
  }

  document.getElementById('historyDetail').innerHTML = `
    <div class="empty-state">
      <p>点击日历上的日期查看详情</p>
    </div>
  `;
}

function changeMonth(delta) {
  calendarDate.setMonth(calendarDate.getMonth() + delta);
  renderCalendar();
}

function showDayDetail(dateKey) {
  const entries = getData('sd_entries', {});
  const dayEntries = entries[dateKey] || [];
  const detail = document.getElementById('historyDetail');

  document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
  // find and highlight selected
  const allDays = document.querySelectorAll('.calendar-day:not(.empty)');
  allDays.forEach(el => {
    const d = parseInt(el.textContent);
    const parts = dateKey.split('-');
    if (d === parseInt(parts[2])) el.classList.add('selected');
  });

  if (dayEntries.length === 0) {
    detail.innerHTML = `
      <div class="history-date">${formatDate(dateKey)}</div>
      <div class="empty-state" style="padding: 20px 0;">
        <p>这一天还没有记录</p>
      </div>
    `;
    return;
  }

  detail.innerHTML = `
    <div class="history-date">${formatDate(dateKey)} · ${dayEntries.length} 条记录</div>
    ${dayEntries.map((e, i) => `
      <div class="history-item">
        <div class="entry-number filled">${i+1}</div>
        <div class="history-text">${escapeHtml(e.text)}</div>
        <span class="history-tag tag-${e.tag}">${e.tag}</span>
      </div>
    `).join('')}
  `;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ============== DREAMS ==============
function addDream() {
  const input = document.getElementById('dreamInput');
  const costInput = document.getElementById('dreamCostInput');
  const name = input.value.trim();
  if (!name) return;

  const dreams = getData('sd_dreams', []);
  dreams.push({
    id: Date.now(),
    name,
    cost: parseFloat(costInput.value) || 0,
    saved: 0,
    done: false,
    createdAt: new Date().toISOString()
  });
  setData('sd_dreams', dreams);
  input.value = '';
  costInput.value = '';
  renderDreams();
  showToast('梦想已添加');
}

function renderDreams() {
  const dreams = getData('sd_dreams', []);
  const container = document.getElementById('dreamList');
  const savings = getData('sd_savings', 0);
  document.getElementById('jarAmount').textContent = `¥${savings.toLocaleString()}`;

  if (dreams.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding: 30px 0;">
        <div class="empty-state-icon">⭐</div>
        <p>写下你的梦想吧<br>有了目标才有动力前进</p>
      </div>
    `;
    return;
  }

  container.innerHTML = dreams.map(d => {
    const pct = d.cost > 0 ? Math.min(100, Math.round((d.saved / d.cost) * 100)) : 0;
    return `
      <div class="dream-item">
        <div class="dream-check ${d.done ? 'done' : ''}" onclick="toggleDream(${d.id})">
          ${d.done ? '✓' : ''}
        </div>
        <div class="dream-content">
          <div class="dream-name ${d.done ? 'done' : ''}">${escapeHtml(d.name)}</div>
          ${d.cost > 0 ? `
            <div class="dream-cost-row">
              <div class="dream-cost-label">进度</div>
              <div class="dream-progress-bar">
                <div class="dream-progress-fill" style="width: ${pct}%"></div>
              </div>
              <div class="dream-amount">¥${d.saved}/${d.cost}</div>
            </div>
          ` : ''}
        </div>
        <button class="dream-delete" onclick="deleteDream(${d.id})">×</button>
      </div>
    `;
  }).join('');
}

function toggleDream(id) {
  const dreams = getData('sd_dreams', []);
  const dream = dreams.find(d => d.id === id);
  if (dream) {
    dream.done = !dream.done;
    setData('sd_dreams', dreams);
    renderDreams();
  }
}

function deleteDream(id) {
  let dreams = getData('sd_dreams', []);
  dreams = dreams.filter(d => d.id !== id);
  setData('sd_dreams', dreams);
  renderDreams();
}

// ============== SAVINGS JAR ==============
let savingsMode = 'deposit';

function showSavingsModal(mode) {
  savingsMode = mode;
  document.getElementById('savingsModalTitle').textContent = mode === 'deposit' ? '存入金额' : '支出金额';
  document.getElementById('savingsModal').classList.add('show');
  document.getElementById('savingsInput').value = '';
  document.getElementById('savingsNote').value = '';
  document.getElementById('savingsInput').focus();
}

function confirmSavings() {
  const amount = parseFloat(document.getElementById('savingsInput').value);
  if (!amount || amount <= 0) {
    showToast('请输入有效金额');
    return;
  }

  let savings = getData('sd_savings', 0);
  const logs = getData('sd_savings_log', []);

  if (savingsMode === 'deposit') {
    savings += amount;
    logs.push({ type: 'deposit', amount, note: document.getElementById('savingsNote').value, date: new Date().toISOString() });
  } else {
    if (amount > savings) {
      showToast('余额不足');
      return;
    }
    savings -= amount;
    logs.push({ type: 'withdraw', amount, note: document.getElementById('savingsNote').value, date: new Date().toISOString() });
  }

  setData('sd_savings', savings);
  setData('sd_savings_log', logs);
  document.getElementById('savingsModal').classList.remove('show');
  renderDreams();
  showToast(savingsMode === 'deposit' ? `已存入 ¥${amount}` : `已支出 ¥${amount}`);
}

// Close modal on overlay click
document.getElementById('savingsModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});

// ============== STATS ==============
function renderStats() {
  const entries = getData('sd_entries', {});
  const dates = Object.keys(entries).filter(d => entries[d].length > 0);
  const totalEntries = dates.reduce((sum, d) => sum + entries[d].length, 0);

  document.getElementById('statTotal').textContent = dates.length;
  document.getElementById('statEntries').textContent = totalEntries;
  document.getElementById('statStreak').textContent = getMaxStreak();
  document.getElementById('statAvg').textContent = dates.length > 0
    ? (totalEntries / dates.length).toFixed(1)
    : '0';

  renderGrowthChart(entries);
  renderTagStats(entries);
}

function renderGrowthChart(entries) {
  const canvas = document.getElementById('growthChart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);

  const w = rect.width;
  const h = rect.height;
  const padding = { top: 20, right: 20, bottom: 30, left: 35 };

  // Get last 30 days data
  const data = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    data.push({
      date: d,
      count: (entries[key] || []).length
    });
  }

  ctx.clearRect(0, 0, w, h);

  // Draw grid lines
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = padding.top + (h - padding.top - padding.bottom) * (1 - i / 5);
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(w - padding.right, y);
    ctx.stroke();

    ctx.fillStyle = '#94a3b8';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(i, padding.left - 8, y + 4);
  }

  // Draw X-axis labels
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  [0, 9, 19, 29].forEach(i => {
    const x = padding.left + (w - padding.left - padding.right) * (i / 29);
    const d = data[i].date;
    ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, x, h - 8);
  });

  // Draw line
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  // Area fill
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = padding.left + (chartW * i / 29);
    const y = padding.top + chartH * (1 - d.count / 5);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(padding.left + chartW, padding.top + chartH);
  ctx.lineTo(padding.left, padding.top + chartH);
  ctx.closePath();
  const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
  gradient.addColorStop(0, 'rgba(79, 70, 229, 0.2)');
  gradient.addColorStop(1, 'rgba(79, 70, 229, 0.02)');
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line stroke
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = padding.left + (chartW * i / 29);
    const y = padding.top + chartH * (1 - d.count / 5);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#4f46e5';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots
  data.forEach((d, i) => {
    if (d.count > 0) {
      const x = padding.left + (chartW * i / 29);
      const y = padding.top + chartH * (1 - d.count / 5);
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = d.count >= 5 ? '#4f46e5' : '#a5b4fc';
      ctx.fill();
    }
  });
}

function renderTagStats(entries) {
  const tagCounts = {};
  Object.values(entries).forEach(dayEntries => {
    dayEntries.forEach(e => {
      tagCounts[e.tag] = (tagCounts[e.tag] || 0) + 1;
    });
  });

  const container = document.getElementById('tagStats');
  const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding: 16px 0;"><p>暂无数据</p></div>';
    return;
  }

  container.innerHTML = sorted.map(([tag, count]) => `
    <div class="tag-stat">
      <div class="tag-dot" style="background: ${TAG_COLORS[tag] || '#94a3b8'}"></div>
      <span>${tag}</span>
      <strong>${count}</strong>
    </div>
  `).join('');
}

// ============== TOAST ==============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============== INIT ==============
function init() {
  // Check onboarding
  if (getData('sd_onboarded', false)) {
    document.getElementById('onboarding').classList.add('hide');
  }

  // Set today's date
  const now = new Date();
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('todayDate').textContent =
    `${now.getMonth()+1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

  // Daily quote
  const quoteIdx = Math.floor(now.getTime() / 86400000) % QUOTES.length;
  document.getElementById('dailyQuote').textContent = QUOTES[quoteIdx];

  // Render
  renderTodayInputs();
  updateStreak();

  // Add input listeners for live progress update
  document.getElementById('entryInputs').addEventListener('input', function() {
    const count = Array.from(document.querySelectorAll('.entry-input')).filter(el => el.value.trim()).length;
    updateProgress(count);
    // Update number indicators
    document.querySelectorAll('.entry-input').forEach((el, i) => {
      const num = el.parentElement.querySelector('.entry-number');
      if (el.value.trim()) num.classList.add('filled');
      else num.classList.remove('filled');
    });
  });
}

init();
</script>
