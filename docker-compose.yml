services:
  success-diary:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: success-diary
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3800}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TRUST_PROXY=${TRUST_PROXY:-1}
      - DB_HOST=${DB_HOST:?请在 Portainer 环境变量中设置外部 PostgreSQL 主机}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-success_diary}
      - DB_USER=${DB_USER:?请在 Portainer 环境变量中设置数据库用户}
      - DB_PASSWORD=${DB_PASSWORD:?请在 Portainer 环境变量中设置数据库密码}
      - JWT_SECRET=${JWT_SECRET:?请在 Portainer 环境变量中设置 JWT_SECRET（至少16字符）}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:?请在 Portainer 环境变量中设置 Turnstile Site Key}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:?请在 Portainer 环境变量中设置 Turnstile Secret Key}
      - PLAUSIBLE_DOMAIN=${PLAUSIBLE_DOMAIN:-}
      - PLAUSIBLE_SCRIPT_URL=${PLAUSIBLE_SCRIPT_URL:-https://plausible.io/js/script.js}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES:-}
